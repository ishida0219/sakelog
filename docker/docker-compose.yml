services:
  nodejs:
    container_name: sakelog-nodejs
    build:
      context: ..
      dockerfile: docker/nodejs/Dockerfile
    working_dir: /app
    env_file:
      - ../html/.env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../html:/app
      - nodejs_node_modules:/app/node_modules
      - nodejs_pnpm_store:/pnpm/store
      - ./nodejs/logs:/app/.manus-logs
    command: ["pnpm", "dev"]
    restart: unless-stopped

volumes:
  nodejs_node_modules:
  nodejs_pnpm_store:
